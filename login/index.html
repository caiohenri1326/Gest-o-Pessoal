<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gestão Pessoal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../login/style.css">
</head>
<body>
    <form class="form-login">
        <p style="font-size: 40px; text-align: center;">Gestão Pessoal</p>
        <div class="mb-3 container-form">
            <label for="exampleInputEmail1" class="form-label">Email</label>
            <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
        <div class="mb-3 container-form">
            <label for="exampleInputPassword1" class="form-label">Senha</label>
            <input type="password" class="form-control" id="exampleInputPassword1">
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
            <label for="exampleCheck1" class="form-check-label">Lembre-me</label>
        </div>
        <div class="container-button">
            <button type="submit" class="btn btn-primary">Enviar</button>
            <button class="btn btn-primary">Criar Nova Conta</button>
        </div>
    </form>
</body>
</html>
